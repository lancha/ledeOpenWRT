name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  # 强制使用 Node.js 24，解决 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # 优化编译环境
  MAKE_JOBS: 4
  GOCACHE: /tmp/go-cache
  CCACHE_DIR: /workdir/openwrt/.ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理工作目录（解决目录已存在的问题）
        sudo rm -rf /workdir/openwrt
        sudo rm -rf $GITHUB_WORKSPACE/openwrt
        
        # 清理磁盘空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        
        # 更新包列表
        sudo -E apt-get -qq update
        
        # 分批安装包
        echo "Installing base packages..."
        sudo -E apt-get -qq install -y --no-install-recommends \
          build-essential ccache git unzip python3 python3-dev time \
          file wget curl rsync
        
        echo "Installing development tools..."
        sudo -E apt-get -qq install -y --no-install-recommends \
          asciidoc binutils bzip2 gawk gettext libncurses5-dev libz-dev \
          patch zlib1g-dev subversion flex uglifyjs gcc-multilib \
          p7zip-full msmtp libssl-dev texinfo libreadline-dev \
          libglib2.0-dev libxml2-dev libtool autoconf automake
        
        echo "Installing additional packages..."
        sudo -E apt-get -qq install -y --no-install-recommends \
          ack antlr3 autopoint bison cmake cpio device-tree-compiler \
          fastjar gperf help2man intltool libelf-dev libfuse-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libpython3-dev mkisofs ninja-build pkgconf python2.7 \
          python3-pyelftools python3-setuptools scons squashfs-tools \
          swig texinfo xmlto xxd || true
        
        # 清理
        sudo -E apt-get -qq autoremove --purge -y
        sudo -E apt-get -qq clean
        
        # 设置时区
        sudo timedatectl set-timezone "$TZ" || sudo ln -sf /usr/share/zoneinfo/"$TZ" /etc/localtime
        
        # 创建工作目录
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # 修复 swapfile 权限问题
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile 2>/dev/null || true
        
        echo "Initialization completed"

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Cache feeds and source
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/dl
          /workdir/openwrt/build_dir
          /workdir/openwrt/staging_dir
          /workdir/openwrt/tmp
          /workdir/openwrt/.ccache
          ~/.cache/ccache
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default', '.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: Clone source code
      working-directory: /workdir
      run: |
        # 确保目录不存在
        rm -rf openwrt
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        if [ -f $FEEDS_CONF ]; then
          cp $FEEDS_CONF openwrt/feeds.conf.default
        fi
        
        cd openwrt
        
        # 去重 feeds
        if [ -f feeds.conf.default ]; then
          awk '!seen[$0]++' feeds.conf.default > feeds.conf.default.tmp
          mv feeds.conf.default.tmp feeds.conf.default
          echo "Feeds configuration:"
          cat feeds.conf.default
        fi
        
        if [ -f $GITHUB_WORKSPACE/$DIY_P1_SH ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
        fi

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
    
        # 1. 完全删除旧配置
        rm -f .config
    
        # 2. 只写入 armvirt 目标配置（不运行 defconfig）
        cat > .config << 'EOF'
CONFIG_TARGET_armvirt=y
CONFIG_TARGET_armvirt_64=y
CONFIG_TARGET_armvirt_64_DEVICE_generic=y
CONFIG_TARGET_BOARD="armvirt"
CONFIG_TARGET_SUBTARGET="64"
CONFIG_TARGET_PROFILE="DEVICE_generic"
CONFIG_ARCH="aarch64"
CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"

# 禁用所有 x86 相关
# CONFIG_TARGET_x86 is not set
# CONFIG_TARGET_x86_64 is not set

# 禁用 GRUB
# CONFIG_GRUB_IMAGES is not set
# CONFIG_GRUB_EFI_IMAGES is not set

# 文件系统
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_TARGET_ROOTFS_TARGZ=y
CONFIG_TARGET_IMAGES_GZIP=y

# 虚拟化驱动
CONFIG_PACKAGE_kmod-vmxnet3=y
CONFIG_PACKAGE_kmod-virtio=y
CONFIG_PACKAGE_kmod-virtio-net=y
CONFIG_PACKAGE_kmod-virtio-pci=y
EOF

        # 3. 运行 defconfig（会补充依赖）
        make defconfig
    
        # 4. 强制删除所有 x86 相关配置
        echo "=== Removing x86 traces ==="
        sed -i '/CONFIG_TARGET_x86/d' .config
        sed -i '/CONFIG_GRUB/d' .config
        sed -i '/CONFIG_VMDK/d' .config
        sed -i '/x86_64/d' .config
    
        # 5. 强制设置 BOARD 为 armvirt
        sed -i 's/CONFIG_TARGET_BOARD="x86"/CONFIG_TARGET_BOARD="armvirt"/g' .config
        sed -i 's/CONFIG_TARGET_BOARD="x86_64"/CONFIG_TARGET_BOARD="armvirt"/g' .config
    
        # 6. 确保 armvirt 配置正确
        echo "CONFIG_TARGET_armvirt=y" >> .config
        echo "CONFIG_TARGET_armvirt_64=y" >> .config
        echo "CONFIG_TARGET_BOARD=\"armvirt\"" >> .config
    
        # 7. 最终验证
        echo "=== Final verification ==="
        echo "CONFIG_TARGET_BOARD:"
        grep "CONFIG_TARGET_BOARD" .config
        echo ""
        echo "armvirt targets:"
        grep "CONFIG_TARGET_armvirt" .config
        echo ""
        echo "x86 targets (should be empty):"
        grep "CONFIG_TARGET_x86" .config || echo "No x86 targets (good)"
    
        if grep -q "CONFIG_TARGET_BOARD=\"x86\"" .config; then
          echo "ERROR: BOARD is still x86!"
          exit 1
        fi
    
        if ! grep -q "CONFIG_TARGET_BOARD=\"armvirt\"" .config; then
          echo "ERROR: BOARD is not armvirt!"
          exit 1
        fi
    
        echo "✓ Configuration is valid for armvirt"  
        
    - name: Verify no GRUB packages
      run: |
        cd openwrt
        echo "=== Checking for invalid packages ==="
        
        # 检查是否有 GRUB2 包
        if grep -q "^CONFIG_PACKAGE_grub2" .config; then
          echo "ERROR: GRUB2 packages found in armvirt config!"
          echo "Found these lines:"
          grep "^CONFIG_PACKAGE_grub2" .config
          exit 1
        fi
        
        # 检查是否有 GRUB 配置
        if grep -q "^CONFIG_GRUB" .config; then
          echo "ERROR: GRUB options found in armvirt config!"
          grep "^CONFIG_GRUB" .config
          exit 1
        fi
        
        # 检查目标架构是否正确
        if ! grep -q "^CONFIG_TARGET_armvirt=y" .config; then
          echo "ERROR: armvirt target not properly set!"
          exit 1
        fi
        
        echo "✓ Configuration verification passed"
        echo "✓ No GRUB packages found"
        echo "✓ Target architecture: armvirt"
        
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        
        # 下载重试逻辑
        for i in 1 2 3; do
          echo "Download attempt $i/3"
          if make download -j8; then
            echo "Download successful"
            break
          elif [ $i -eq 3 ]; then
            echo "Download failed, trying single thread..."
            make download -j1 V=s
          else
            echo "Retrying in 30 seconds..."
            sleep 30
          fi
        done
        
        # 清理无效文件
        find dl -size -1024c -exec rm -f {} \;
        chmod -R u+rw dl
        
        echo "Download size: $(du -sh dl | cut -f1)"

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        
        echo "System resources:"
        free -h
        df -h
        echo "CPU cores: $(nproc)"
        
        # 限制并行数
        JOBS=4
        echo "Using $JOBS parallel jobs"
        
        # 编译
        if make -j$JOBS; then
          echo "Compilation successful!"
        else
          echo "Retrying with single thread..."
          if ! make -j1; then
            echo "Compilation failed!"
            make -j1 V=s | tee compile_verbose.log
            exit 1
          fi
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 生成设备名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled() && steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "Firmware files:"
        ls -lh *.img.gz 2>/dev/null || ls -lh

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled() && steps.compile.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        cat > release.txt << 'EOF'
        🍁 OpenWrt 编译完成

        ### 登录信息
        - **管理IP**: 192.168.0.200
        - **用户名**: root
        - **密码**: password

        ### 固件说明
        - 适用于树莓派4 (Raspberry Pi 4) / ESXi ARM
        - 包含 Luci 界面和常用插件
        - 内核版本: Linux 6.6

        ### 安装方法
        1. 解压 .img.gz 文件
        2. 使用 dd 或 Raspberry Pi Imager 写入 SD 卡
        3. 或在 ESXi 中作为虚拟机安装

        ### 注意事项
        - 首次启动后请立即修改密码
        - 如无法访问，请检查电脑 IP 是否在同一网段
        EOF
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        make_latest: true

    - name: Upload compile logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          openwrt/compile_verbose.log
          openwrt/.config
          openwrt/dl
        retention-days: 7

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.0
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
